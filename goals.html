<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Dashboard — Goals</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content page-content" id="content">

      <div class="section-header">
        <div>
          <div class="section-title">Goals &amp; Savings</div>
          <div class="section-subtitle">India trip · Emergency fund · Wealth target</div>
        </div>
      </div>

      <!-- India Trip -->
      <div class="grid-2">
        <div class="panel">
          <div class="panel-header"><span class="panel-title">India Trip — Oct 2026</span></div>
          <div id="india-fields"></div>
        </div>
        <div class="panel gauge-wrap" style="justify-content:center">
          <div class="panel-title" style="margin-bottom:12px">Trip Progress</div>
          <div class="gauge-chart-container" style="width:180px;height:100px"><canvas id="chart-india-gauge"></canvas></div>
          <div class="gauge-value" id="india-gauge-val">0%</div>
          <div class="gauge-label" id="india-gauge-lbl">of £3,000</div>
        </div>
      </div>

      <div class="panel mt-20">
        <div class="panel-header"><span class="panel-title">Budget Breakdown</span></div>
        <div class="table-wrap" id="india-breakdown-table"></div>
      </div>

      <div class="panel mt-20">
        <div class="panel-header">
          <span class="panel-title">Monthly Savings Log</span>
          <button class="btn btn-primary btn-sm" id="add-india-log-btn">+ Add month</button>
        </div>
        <div class="table-wrap" id="india-log-table"></div>
      </div>

      <div class="grid-2 mt-20">
        <div class="panel">
          <div class="panel-header"><span class="panel-title">Running Total</span></div>
          <div class="chart-wrap chart-h-200"><canvas id="chart-india-line"></canvas></div>
        </div>
        <div class="panel">
          <div class="panel-header"><span class="panel-title">Monthly Saved</span></div>
          <div class="chart-wrap chart-h-200"><canvas id="chart-india-bar"></canvas></div>
        </div>
      </div>

    </div>
  </div>
</div>
<script type="module" src="js/pages/goals.js"></script>
</body>
</html>
