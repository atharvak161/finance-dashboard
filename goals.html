<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Dashboard — Goals</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <script>if(localStorage.getItem('oled_mode')==='1')document.documentElement.classList.add('oled');</script>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content page-content" id="content">

      <div class="section-header" data-section="goals">
        <div>
          <div class="section-title">Goals &amp; Savings</div>
          <div class="section-subtitle">Emergency fund · India trip · Wealth target</div>
        </div>
      </div>

      <!-- Summary cards -->
      <div class="grid-2" id="goals-summary-cards"></div>

      <!-- Wealth summary card (full width) -->
      <div id="goals-wealth-card" class="mt-20"></div>

      <!-- Edit section -->
      <div class="panel mt-20" id="goals-edit-panel">
        <div class="panel-header">
          <span class="panel-title">Goals</span>
          <button class="btn btn-secondary btn-sm" id="goals-edit-btn">&#9998; Edit Goals</button>
        </div>
        <div id="goals-edit-body"></div>
      </div>

    </div>
  </div>
</div>
<script type="module" src="js/pages/goals.js"></script>
</body>
</html>
