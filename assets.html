<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Dashboard — Assets</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content page-content" id="content">

      <div class="section-header">
        <div>
          <div class="section-title">Assets &amp; Investments</div>
          <div class="section-subtitle">Pension, savings &amp; insurance-linked plans</div>
        </div>
      </div>

      <div class="grid-2" data-section="investments">
        <div class="panel" id="pension-card"></div>
        <div class="panel" id="cash-card"></div>
      </div>

      <div id="ulip-section" class="mt-20"></div>

      <div class="panel mt-20">
        <div class="panel-header"><span class="panel-title">Combined ULIP Projection (Expected Rate)</span></div>
        <div class="chart-wrap chart-h-300"><canvas id="chart-ulip-combined"></canvas></div>
      </div>

    </div>
  </div>
</div>
<script type="module" src="js/pages/assets.js"></script>
</body>
</html>
