<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Dashboard — Assets</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content page-content" id="content">

      <div class="section-header">
        <div>
          <div class="section-title">Assets &amp; Investments</div>
          <div class="section-subtitle">Cash, pension, ULIPs, UK wrappers &amp; India instruments — view &amp; edit</div>
        </div>
      </div>

      <div class="tabs" id="assets-tabs" data-section="investments">
        <button class="tab-btn active" data-tab="cash">Cash Accounts</button>
        <button class="tab-btn" data-tab="pension">Pension</button>
        <button class="tab-btn" data-tab="ulips">ULIPs</button>
        <button class="tab-btn" data-tab="uk">UK Wrappers</button>
        <button class="tab-btn" data-tab="india">India</button>
      </div>

      <div id="assets-content"></div>

    </div>
  </div>
</div>
<script type="module" src="js/pages/assets.js"></script>
</body>
</html>
