<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Dashboard — Login</title>
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/components.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .btn-full { width: 100%; justify-content: center; padding: 10px; font-size: 14px; }
    .strength-bar { height: 3px; border-radius: 2px; background: var(--bg-input); margin-top: 4px; }
    .strength-fill { height: 100%; border-radius: 2px; transition: width 0.2s, background 0.2s; }
    .lock-icon { width: 40px; height: 40px; color: var(--color-warning); margin: 0 auto 8px; display: block; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <svg class="login-logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2" /><line x1="8" y1="21" x2="16" y2="21" /><line x1="12" y1="17" x2="12" y2="21" />
        </svg>
        <span class="login-logo-text">Finance Dashboard</span>
      </div>

      <!-- First-run setup -->
      <div id="setup-panel" style="display:none">
        <h1 class="login-title">Create your password</h1>
        <p class="login-subtitle">Your data is encrypted with AES-256. This password cannot be recovered.</p>
        <form class="login-form" id="setup-form" autocomplete="off">
          <div class="form-group">
            <label class="form-label">New password (min. 6 characters)</label>
            <input type="password" id="setup-pwd" class="form-input" placeholder="Enter password" autocomplete="new-password" required minlength="6" />
            <div class="strength-bar"><div class="strength-fill" id="strength-fill" style="width:0%"></div></div>
          </div>
          <div class="form-group">
            <label class="form-label">Confirm password</label>
            <input type="password" id="setup-confirm" class="form-input" placeholder="Confirm password" autocomplete="new-password" required />
          </div>
          <div id="setup-error" class="login-error" style="display:none"></div>
          <button type="submit" class="btn btn-primary btn-full" id="setup-btn">
            <span id="setup-btn-text">Set password &amp; enter</span>
            <div class="spinner" id="setup-spinner" style="display:none;width:16px;height:16px;margin-left:6px;"></div>
          </button>
          <p class="hint" style="text-align:center">Your financial data will be pre-loaded after setup.</p>
        </form>
      </div>

      <!-- Login -->
      <div id="login-panel" style="display:none">
        <h1 class="login-title">Welcome back</h1>
        <p class="login-subtitle" id="login-subtitle">Enter your password to unlock your dashboard.</p>
        <form class="login-form" id="login-form" autocomplete="off">
          <div id="lockout-box" class="lockout-timer" style="display:none">
            <svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            Account locked for <span id="lockout-countdown">--</span>
          </div>
          <div id="login-fields">
            <div class="form-group">
              <label class="form-label">Password</label>
              <input type="password" id="login-pwd" class="form-input" placeholder="Enter password" autocomplete="current-password" required />
            </div>
            <div id="login-error" class="login-error" style="display:none"></div>
            <button type="submit" class="btn btn-primary btn-full" id="login-btn">
              <span id="login-btn-text">Unlock dashboard</span>
              <div class="spinner" id="login-spinner" style="display:none;width:16px;height:16px;margin-left:6px;"></div>
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script type="module">
    import { isFirstRun, setupPassword, login, checkLockout, getEncKey } from './js/auth.js';
    import { initializeDefaults } from './js/store.js';

    // Always clear stale session flag on login page load.
    // The encryption key lives in memory only — it's gone on every page load,
    // so the user must always re-enter their password.
    sessionStorage.removeItem('session_active');

    const setupPanel  = document.getElementById('setup-panel');
    const loginPanel  = document.getElementById('login-panel');
    const setupForm   = document.getElementById('setup-form');
    const loginForm   = document.getElementById('login-form');
    const setupError  = document.getElementById('setup-error');
    const loginError  = document.getElementById('login-error');
    const lockoutBox  = document.getElementById('lockout-box');
    const loginFields = document.getElementById('login-fields');
    const lockoutCountdown = document.getElementById('lockout-countdown');
    let lockoutInterval = null;

    function showError(el, msg) { el.textContent = msg; el.style.display = 'block'; }
    function hideError(el) { el.style.display = 'none'; }

    function setLoading(btnText, spinner, state) {
      btnText.parentElement.disabled = state;
      spinner.style.display = state ? 'inline-block' : 'none';
    }

    // ── Password strength indicator
    document.getElementById('setup-pwd').addEventListener('input', e => {
      const v = e.target.value;
      const fill = document.getElementById('strength-fill');
      let pct = 0, color = '#f2495c';
      if (v.length >= 6)  { pct = 33; color = '#ff9830'; }
      if (v.length >= 10) { pct = 66; color = '#fade2a'; }
      if (v.length >= 14 && /[A-Z]/.test(v) && /[0-9]/.test(v)) { pct = 100; color = '#73bf69'; }
      fill.style.width = pct + '%';
      fill.style.background = color;
    });

    // ── Lockout countdown
    function startLockoutCountdown() {
      lockoutBox.style.display = 'block';
      loginFields.style.display = 'none';
      if (lockoutInterval) clearInterval(lockoutInterval);
      lockoutInterval = setInterval(() => {
        const status = checkLockout();
        if (!status.locked) {
          clearInterval(lockoutInterval);
          lockoutBox.style.display = 'none';
          loginFields.style.display = 'block';
          return;
        }
        const sec = Math.ceil(status.remainingMs / 1000);
        const m = Math.floor(sec / 60), s = sec % 60;
        lockoutCountdown.textContent = m > 0 ? `${m}m ${s}s` : `${s}s`;
      }, 500);
    }

    function init() {
      if (isFirstRun()) {
        setupPanel.style.display = 'block';
      } else {
        loginPanel.style.display = 'block';
        const ls = checkLockout();
        if (ls.locked) startLockoutCountdown();
      }
    }

    // ── Setup
    setupForm.addEventListener('submit', async e => {
      e.preventDefault();
      hideError(setupError);
      const pwd     = document.getElementById('setup-pwd').value;
      const confirm = document.getElementById('setup-confirm').value;
      if (pwd !== confirm) { showError(setupError, 'Passwords do not match.'); return; }

      const btnText = document.getElementById('setup-btn-text');
      const spinner = document.getElementById('setup-spinner');
      setLoading(btnText, spinner, true);
      btnText.textContent = 'Encrypting...';

      try {
        await setupPassword(pwd);
        await initializeDefaults(getEncKey());
        window.location.replace('dashboard.html');
      } catch(err) {
        showError(setupError, err.message);
        btnText.textContent = 'Set password & enter';
        setLoading(btnText, spinner, false);
      }
    });

    // ── Login
    loginForm.addEventListener('submit', async e => {
      e.preventDefault();
      hideError(loginError);
      const pwd = document.getElementById('login-pwd').value;

      const btnText = document.getElementById('login-btn-text');
      const spinner = document.getElementById('login-spinner');
      setLoading(btnText, spinner, true);
      btnText.textContent = 'Verifying...';

      try {
        await login(pwd);
        window.location.replace('dashboard.html');
      } catch(err) {
        showError(loginError, err.message);
        btnText.textContent = 'Unlock dashboard';
        setLoading(btnText, spinner, false);
        const ls = checkLockout();
        if (ls.locked) startLockoutCountdown();
      }
    });

    init();
  </script>
</body>
</html>
