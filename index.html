<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Dashboard — Login</title>
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/components.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .btn-full { width: 100%; justify-content: center; padding: 10px; font-size: 14px; }
    .strength-bar { height: 3px; border-radius: 2px; background: var(--bg-input); margin-top: 4px; }
    .strength-fill { height: 100%; border-radius: 2px; transition: width 0.2s, background 0.2s; }
    .lock-icon { width: 40px; height: 40px; color: var(--color-warning); margin: 0 auto 8px; display: block; }
    .error-box {
      display: none;
      background: rgba(242,73,92,0.10);
      border: 1px solid rgba(242,73,92,0.35);
      border-radius: 6px;
      padding: 10px 14px;
      gap: 10px;
      align-items: flex-start;
    }
    .error-box.show { display: flex; }
    .error-box svg { flex-shrink: 0; color: #f2495c; margin-top: 1px; }
    .error-box-body { flex: 1; }
    .error-box-title { color: #f2495c; font-size: 13px; font-weight: 600; }
    .error-box-sub { color: #8e9099; font-size: 12px; margin-top: 2px; }
    .attempts-pip-row { display: flex; gap: 5px; margin-top: 6px; }
    .attempt-pip {
      width: 20px; height: 5px; border-radius: 3px;
      background: rgba(242,73,92,0.25);
      transition: background 0.2s;
    }
    .attempt-pip.used { background: #f2495c; }
    .pwd-wrap { position: relative; }
    .pwd-wrap .form-input { padding-right: 40px; }
    .pwd-eye {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--text-muted);
      padding: 2px; display: flex; align-items: center;
      transition: color 0.15s;
    }
    .pwd-eye:hover { color: var(--text-primary); }
    .pwd-eye svg { width: 16px; height: 16px; pointer-events: none; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <svg class="login-logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2" /><line x1="8" y1="21" x2="16" y2="21" /><line x1="12" y1="17" x2="12" y2="21" />
        </svg>
        <span class="login-logo-text">Finance Dashboard</span>
      </div>

      <!-- First-run setup -->
      <div id="setup-panel" style="display:none">
        <h1 class="login-title">Create your password</h1>
        <p class="login-subtitle">Your data is encrypted with AES-256. This password cannot be recovered.</p>
        <form class="login-form" id="setup-form" autocomplete="off">
          <div class="form-group">
            <label class="form-label">New password (min. 6 characters)</label>
            <div class="pwd-wrap">
              <input type="password" id="setup-pwd" class="form-input" placeholder="Enter password" autocomplete="new-password" required minlength="6" />
              <button type="button" class="pwd-eye" data-target="setup-pwd" tabindex="-1" aria-label="Show password">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <div class="strength-bar"><div class="strength-fill" id="strength-fill" style="width:0%"></div></div>
          </div>
          <div class="form-group">
            <label class="form-label">Confirm password</label>
            <div class="pwd-wrap">
              <input type="password" id="setup-confirm" class="form-input" placeholder="Confirm password" autocomplete="new-password" required />
              <button type="button" class="pwd-eye" data-target="setup-confirm" tabindex="-1" aria-label="Show password">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <div id="setup-error" style="display:none;background:#f2495c;color:#fff;font-size:13px;font-weight:600;padding:10px 14px;border-radius:6px;margin-top:4px"></div>
          <button type="submit" class="btn btn-primary btn-full" id="setup-btn">
            <span id="setup-btn-text">Set password &amp; enter</span>
            <div class="spinner" id="setup-spinner" style="display:none;width:16px;height:16px;margin-left:6px;"></div>
          </button>
          <p class="hint" style="text-align:center">Your financial data will be pre-loaded after setup.</p>
        </form>
      </div>

      <!-- Login -->
      <div id="login-panel" style="display:none">
        <h1 class="login-title">Welcome back, Atharva 👋</h1>
        <p class="login-subtitle" id="login-subtitle">Enter your password to unlock your dashboard.</p>
        <form class="login-form" id="login-form" autocomplete="off">
          <div id="lockout-box" class="lockout-timer" style="display:none">
            <svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            Account locked for <span id="lockout-countdown">--</span>
          </div>
          <div id="login-fields">
            <div class="form-group">
              <label class="form-label">Password</label>
              <div class="pwd-wrap">
                <input type="password" id="login-pwd" class="form-input" placeholder="Enter password" autocomplete="current-password" required />
                <button type="button" class="pwd-eye" data-target="login-pwd" tabindex="-1" aria-label="Show password">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
            </div>
            <div id="login-error" class="error-box" role="alert">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              <div class="error-box-body">
                <div class="error-box-title" id="login-error-title">Incorrect password</div>
                <div class="error-box-sub" id="login-error-sub"></div>
                <div class="attempts-pip-row" id="login-pips"></div>
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="login-btn">
              <span id="login-btn-text">Unlock dashboard</span>
              <div class="spinner" id="login-spinner" style="display:none;width:16px;height:16px;margin-left:6px;"></div>
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script type="module">
    import { isFirstRun, setupPassword, login, checkLockout, getEncKey } from './js/auth.js';
    import { initializeDefaults } from './js/store.js';

    // Always clear stale session on fresh load — enc key is memory-only.
    sessionStorage.removeItem('session_active');

    // ── Load CDN script helper ───────────────────────────────
    function loadScript(src) {
      return new Promise((res, rej) => {
        if (document.querySelector(`script[src="${src}"]`)) { res(); return; }
        const s = document.createElement('script');
        s.src = src;
        s.onload = res;
        s.onerror = () => rej(new Error('Failed to load: ' + src.split('/').slice(-3).join('/')));
        document.head.appendChild(s);
      });
    }

    // ── Transition to dashboard IN THE SAME PAGE ─────────────
    // We never navigate away — that would destroy the in-memory enc key.
    // Instead: load CDN scripts, fetch dashboard.html body, inject it,
    // then dynamically import ui.js (shares the same auth.js module
    // instance, so _encKey is still set).
    async function transitionToDashboard() {
      // Add layout CSS (not loaded on login page)
      if (!document.querySelector('link[href="css/layout.css"]')) {
        const l = document.createElement('link');
        l.rel = 'stylesheet'; l.href = 'css/layout.css';
        document.head.appendChild(l);
      }

      // Load CDN scripts sequentially
      await loadScript('https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js');
      await loadScript('https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js');
      await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
      await loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js');
      await loadScript('https://cdn.jsdelivr.net/npm/lucide@0.263.1/dist/umd/lucide.min.js');

      // Fetch dashboard template and inject its body
      const resp = await fetch('dashboard.html');
      const html = await resp.text();
      const doc  = new DOMParser().parseFromString(html, 'text/html');
      document.body.innerHTML = doc.body.innerHTML;
      // Strip any <script> tags injected via innerHTML (they don't run anyway)
      document.body.querySelectorAll('script').forEach(s => s.remove());

      // Import ui.js — it shares the same auth.js module instance,
      // so getEncKey() returns the key that was set during login above.
      // Handle errors here — the login DOM is gone so outer catch can't show them.
      try {
        await import('./js/ui.js');
      } catch (err) {
        document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#111217">
          <div style="color:#f2495c;font-family:monospace;max-width:500px;padding:32px">
            <p style="font-size:16px;font-weight:600;margin-bottom:8px">Failed to load dashboard</p>
            <p style="font-size:12px;color:#8e9099;margin-bottom:16px">${err.message}</p>
            <a href="." style="color:#5794f2;font-size:13px">Reload page</a>
          </div>
        </div>`;
      }
    }

    const setupPanel  = document.getElementById('setup-panel');
    const loginPanel  = document.getElementById('login-panel');
    const setupForm   = document.getElementById('setup-form');
    const loginForm   = document.getElementById('login-form');
    const setupError  = document.getElementById('setup-error');
    const loginError  = document.getElementById('login-error');
    const lockoutBox  = document.getElementById('lockout-box');
    const loginFields = document.getElementById('login-fields');
    const lockoutCountdown = document.getElementById('lockout-countdown');
    let lockoutInterval = null;

    function showError(el, msg) { el.textContent = msg; el.style.display = 'block'; }
    function hideError(el) { el.style.display = 'none'; }

    // ── Rich login error with attempt pips ───────────────────
    function showLoginError(msg) {
      const attempts = parseInt(localStorage.getItem('login_attempts') || '0');
      const remaining = Math.max(0, 5 - attempts);
      const box   = document.getElementById('login-error');
      const title = document.getElementById('login-error-title');
      const sub   = document.getElementById('login-error-sub');
      const pips  = document.getElementById('login-pips');

      title.textContent = msg.includes('locked') ? 'Account locked' : 'Incorrect password';
      sub.textContent   = remaining > 0
        ? `${remaining} attempt${remaining === 1 ? '' : 's'} remaining before lockout`
        : 'Account is now locked.';

      pips.innerHTML = Array.from({length: 5}, (_, i) =>
        `<div class="attempt-pip ${i < attempts ? 'used' : ''}"></div>`
      ).join('');

      box.classList.add('show');

      // Shake the input
      const input = document.getElementById('login-pwd');
      input.style.borderColor = '#f2495c';
      input.addEventListener('input', () => { input.style.borderColor = ''; box.classList.remove('show'); }, { once: true });
    }

    function hideLoginError() {
      document.getElementById('login-error').classList.remove('show');
      document.getElementById('login-pwd').style.borderColor = '';
    }

    function setLoading(btnText, spinner, state) {
      btnText.parentElement.disabled = state;
      spinner.style.display = state ? 'inline-block' : 'none';
    }

    // ── Eye toggle (show/hide password)
    const EYE_OPEN  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
    const EYE_CLOSED = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;

    document.querySelectorAll('.pwd-eye').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.target);
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        btn.innerHTML = isHidden ? EYE_CLOSED : EYE_OPEN;
        btn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
      });
    });

    // ── Password strength indicator
    document.getElementById('setup-pwd').addEventListener('input', e => {
      const v = e.target.value;
      const fill = document.getElementById('strength-fill');
      let pct = 0, color = '#f2495c';
      if (v.length >= 6)  { pct = 33; color = '#ff9830'; }
      if (v.length >= 10) { pct = 66; color = '#fade2a'; }
      if (v.length >= 14 && /[A-Z]/.test(v) && /[0-9]/.test(v)) { pct = 100; color = '#73bf69'; }
      fill.style.width = pct + '%';
      fill.style.background = color;
    });

    // ── Lockout countdown
    function startLockoutCountdown() {
      lockoutBox.style.display = 'block';
      loginFields.style.display = 'none';
      if (lockoutInterval) clearInterval(lockoutInterval);
      lockoutInterval = setInterval(() => {
        const status = checkLockout();
        if (!status.locked) {
          clearInterval(lockoutInterval);
          lockoutBox.style.display = 'none';
          loginFields.style.display = 'block';
          return;
        }
        const sec = Math.ceil(status.remainingMs / 1000);
        const m = Math.floor(sec / 60), s = sec % 60;
        lockoutCountdown.textContent = m > 0 ? `${m}m ${s}s` : `${s}s`;
      }, 500);
    }

    function init() {
      if (isFirstRun()) {
        setupPanel.style.display = 'block';
      } else {
        loginPanel.style.display = 'block';
        const ls = checkLockout();
        if (ls.locked) startLockoutCountdown();
      }
    }

    // ── Setup
    setupForm.addEventListener('submit', async e => {
      e.preventDefault();
      hideError(setupError);
      const pwd     = document.getElementById('setup-pwd').value;
      const confirm = document.getElementById('setup-confirm').value;
      if (pwd !== confirm) { showError(setupError, 'Passwords do not match.'); return; }

      const btnText = document.getElementById('setup-btn-text');
      const spinner = document.getElementById('setup-spinner');
      setLoading(btnText, spinner, true);
      btnText.textContent = 'Encrypting...';

      try {
        await setupPassword(pwd);
        await initializeDefaults(getEncKey());
        btnText.textContent = 'Loading dashboard...';
        await transitionToDashboard();
      } catch(err) {
        const msg = err?.message || err?.type || String(err) || 'Unknown error';
        showError(setupError, msg);
        btnText.textContent = 'Set password & enter';
        setLoading(btnText, spinner, false);
      }
    });

    // ── Login
    loginForm.addEventListener('submit', async e => {
      e.preventDefault();
      hideLoginError();
      const pwd = document.getElementById('login-pwd').value;

      const btnText = document.getElementById('login-btn-text');
      const spinner = document.getElementById('login-spinner');
      setLoading(btnText, spinner, true);
      btnText.textContent = 'Verifying...';

      try {
        await login(pwd);
        btnText.textContent = 'Loading dashboard...';
        await transitionToDashboard();
      } catch(err) {
        showLoginError(err.message);
        btnText.textContent = 'Unlock dashboard';
        setLoading(btnText, spinner, false);
        const ls = checkLockout();
        if (ls.locked) startLockoutCountdown();
      }
    });

    init();
  </script>
</body>
</html>
