<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Dashboard</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/theme.css">
  <style>
    /* ── Black canvas ─────────────────────────────────────── */
    html, body {
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    .login-shell {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: var(--font-mono);
    }

    /* ── Static title ─────────────────────────────────────── */
    .fd-title {
      font-size: 15px;
      font-weight: 400;
      color: rgba(0,191,255,0.55);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 32px;
      user-select: none;
      cursor: pointer;
      transition: color 0.2s, text-shadow 0.2s;
      text-shadow: 0 0 20px rgba(0,191,255,0.2);
    }
    .fd-title:hover {
      color: rgba(0,229,255,0.85);
      text-shadow: 0 0 30px rgba(0,191,255,0.6), 0 0 60px rgba(0,191,255,0.2);
    }

    /* ── Auth container (hidden until CTRL+ALT+A) ─────────── */
    .auth-wrap {
      display: flex;
      flex-direction: column;
      gap: 0;
      width: 320px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .auth-wrap.visible {
      opacity: 1;
      pointer-events: auto;
    }

    /* ── Separator ────────────────────────────────────────── */
    .auth-sep {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,191,255,0.5), transparent);
      box-shadow: 0 0 8px rgba(0,191,255,0.3);
      margin-bottom: 20px;
    }

    /* ── Prompt rows ──────────────────────────────────────── */
    .prompt-row {
      display: flex;
      align-items: baseline;
      gap: 0;
      height: 30px;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }
    .prompt-row.show {
      opacity: 1;
      transform: translateY(0);
    }

    .prompt-key {
      font-size: 13px;
      color: rgba(0,191,255,0.45);
      white-space: nowrap;
      width: 52px;
      flex-shrink: 0;
      user-select: none;
    }

    /* locked-in value (after field committed) */
    .prompt-value-static {
      font-size: 13px;
      color: rgba(0,229,255,0.75);
      text-shadow: 0 0 10px rgba(0,191,255,0.4);
      flex: 1;
    }

    /* editable input */
    .prompt-input {
      background: transparent;
      border: none;
      outline: none;
      color: rgba(220,240,255,0.92);
      font-family: var(--font-mono);
      font-size: 13px;
      caret-color: #00bfff;
      flex: 1;
      padding: 0;
      letter-spacing: 0.02em;
    }
    .prompt-input::placeholder { color: rgba(0,191,255,0.18); }

    /* ── Status line ──────────────────────────────────────── */
    .auth-status {
      margin-top: 16px;
      height: 18px;
      font-size: 12px;
      color: rgba(0,191,255,0.4);
      letter-spacing: 0.06em;
      text-align: left;
      transition: color 0.2s;
    }
    .auth-status.error  { color: rgba(255,23,68,0.9);  text-shadow: 0 0 12px rgba(255,23,68,0.4); }
    .auth-status.ok     { color: rgba(0,230,118,0.9);  text-shadow: 0 0 12px rgba(0,230,118,0.4); }
    .auth-status.busy   { color: rgba(0,191,255,0.5); }

    /* ── Fail shake ───────────────────────────────────────── */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-6px); }
      40%      { transform: translateX(6px); }
      60%      { transform: translateX(-4px); }
      80%      { transform: translateX(4px); }
    }
    .auth-wrap.shake { animation: shake 0.32s ease; }

    /* ── Lockout timer ────────────────────────────────────── */
    .lockout-display {
      display: none;
      font-size: 12px;
      color: rgba(255,152,48,0.70);
      letter-spacing: 0.04em;
      margin-top: 8px;
    }
    .lockout-display.visible { display: block; }

    /* ── Spinner (inline, monospace) ──────────────────────── */
    .spin-char {
      display: inline-block;
      animation: spinChar 0.6s steps(4) infinite;
    }
    @keyframes spinChar {
      0%  { content: '⠋'; }
      25% { content: '⠙'; }
      50% { content: '⠹'; }
      75% { content: '⠸'; }
    }
    .spin-char::before { content: '⠋'; }
  </style>
</head>
<body>
  <div class="login-shell" id="shell">
    <div class="fd-title" id="fd-title" role="button" tabindex="0" aria-label="Click to authenticate">Finance Dashboard</div>

    <div class="auth-wrap" id="auth-wrap" role="dialog" aria-label="Authentication" aria-modal="true">
      <div class="auth-sep"></div>

      <!-- Row 1: username -->
      <div class="prompt-row" id="row-user">
        <span class="prompt-key" aria-hidden="true">user ›&nbsp;</span>
        <span class="prompt-value-static" id="val-user" style="display:none"></span>
        <input class="prompt-input" id="input-user"
               type="text" autocomplete="username"
               spellcheck="false" autocorrect="off" autocapitalize="off"
               placeholder="username"
               aria-label="Username" />
      </div>

      <!-- Row 2: password (hidden until username committed) -->
      <div class="prompt-row" id="row-pass" style="display:none">
        <span class="prompt-key" aria-hidden="true">pass ›&nbsp;</span>
        <input class="prompt-input" id="input-pass"
               type="password" autocomplete="current-password"
               placeholder="password"
               aria-label="Password" />
      </div>

      <div class="auth-status" id="auth-status" aria-live="polite"></div>
      <div class="lockout-display" id="lockout-display" aria-live="polite"></div>
    </div>
  </div>

  <!-- Accessible hint for screen readers -->
  <p class="visually-hidden" aria-live="polite" id="sr-hint">
    Finance Dashboard. Click the title to authenticate.
  </p>

  <style>
    .visually-hidden {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
  </style>

  <script type="module">
    import { authenticate, checkLockout } from './js/auth.js';
    import { initSW, setKey }            from './js/sw-client.js';

    // ── Migration: clear v1 localStorage on first load with v2 auth ──
    const AUTH_VERSION = 'fd_v2_hardcoded_2026';
    if (localStorage.getItem('auth_version') !== AUTH_VERSION) {
      Object.keys(localStorage).forEach(k => {
        if (/^(fin_|auth_|enc_|login_|lockout_)/.test(k)) localStorage.removeItem(k);
      });
      localStorage.setItem('auth_version', AUTH_VERSION);
    }

    // ── DOM refs ──────────────────────────────────────────────────────
    const authWrap      = document.getElementById('auth-wrap');
    const rowUser       = document.getElementById('row-user');
    const rowPass       = document.getElementById('row-pass');
    const inputUser     = document.getElementById('input-user');
    const inputPass     = document.getElementById('input-pass');
    const valUser       = document.getElementById('val-user');
    const statusEl      = document.getElementById('auth-status');
    const lockoutEl     = document.getElementById('lockout-display');
    const srHint        = document.getElementById('sr-hint');

    let _activated = false;
    let _lockoutInterval = null;

    // ── Pre-register SW in background (so it's ready after login) ────
    initSW().catch(() => {});

    // ── Helper: set status line ───────────────────────────────────────
    function setStatus(msg, cls = '') {
      statusEl.textContent = msg;
      statusEl.className   = 'auth-status' + (cls ? ' ' + cls : '');
    }

    // ── Lockout countdown ─────────────────────────────────────────────
    function startLockout() {
      lockoutEl.classList.add('visible');
      clearInterval(_lockoutInterval);
      _lockoutInterval = setInterval(() => {
        const ls = checkLockout();
        if (!ls.locked) {
          clearInterval(_lockoutInterval);
          lockoutEl.classList.remove('visible');
          lockoutEl.textContent = '';
          setStatus('');
          resetToUsername();
          return;
        }
        const s = Math.ceil(ls.remainingMs / 1000);
        lockoutEl.textContent = `wait ${s}s`;
      }, 500);
    }

    // ── Activate the hidden auth UI ───────────────────────────────────
    function activate() {
      if (_activated) return;
      _activated = true;
      srHint.textContent = 'Authentication form active. Enter your username.';

      // Check lockout before showing
      const ls = checkLockout();

      authWrap.classList.add('visible');
      rowUser.classList.add('show');

      if (ls.locked) {
        startLockout();
        return;
      }
      setTimeout(() => inputUser.focus(), 50);
    }

    // ── Reset to username field (after failure / lockout clears) ─────
    function resetToUsername() {
      inputUser.value = '';
      inputPass.value = '';
      valUser.style.display = 'none';
      inputUser.style.display = '';
      rowPass.style.display = 'none';
      rowPass.classList.remove('show');
      setTimeout(() => inputUser.focus(), 50);
    }

    // ── Transition username → password ───────────────────────────────
    function commitUsername() {
      const u = inputUser.value.trim();
      if (!u) return;

      // Lock in the username display
      valUser.textContent   = u;
      valUser.style.display = '';
      inputUser.style.display = 'none';

      // Reveal password row
      rowPass.style.display = '';
      requestAnimationFrame(() => {
        rowPass.classList.add('show');
        setTimeout(() => inputPass.focus(), 80);
      });
    }

    // ── Attempt authentication ────────────────────────────────────────
    async function attemptLogin() {
      const username = inputUser.value.trim() || valUser.textContent.trim();
      const password = inputPass.value;

      if (!username || !password) return;

      setStatus('⠋ verifying', 'busy');
      inputPass.disabled = true;

      try {
        const encKey = await authenticate(username, password);

        setStatus('✓ access granted', 'ok');
        srHint.textContent = 'Authentication successful. Loading dashboard.';

        // Send key to SW vault
        const reg = await initSW();
        // Give SW controller a moment to be ready
        if (!navigator.serviceWorker.controller) {
          await new Promise(resolve => {
            navigator.serviceWorker.addEventListener('controllerchange', resolve, { once: true });
            setTimeout(resolve, 600);
          });
        }
        await setKey(encKey);

        // Store exportable key in sessionStorage so page-init can recover
        // if the SW is terminated between page navigations.
        const rawKey = await crypto.subtle.exportKey('raw', encKey);
        sessionStorage.setItem('_ek', btoa(String.fromCharCode(...new Uint8Array(rawKey))));

        // Navigate after a brief success flash
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 420);

      } catch (err) {
        inputPass.disabled = false;
        inputPass.value    = '';

        const msg = err.message || '';

        if (msg.startsWith('locked:')) {
          const secs = parseInt(msg.split(':')[1]) || 30;
          setStatus('account locked', 'error');
          lockoutEl.textContent = `wait ${secs}s`;
          lockoutEl.classList.add('visible');
          startLockout();
          srHint.textContent = `Account locked. Wait ${secs} seconds.`;
          return;
        }

        // Generic auth failure — shake + clear
        const remaining = parseInt((msg.split(':')[1] || '3'));
        setStatus(`authentication failed · ${remaining} attempt${remaining === 1 ? '' : 's'} left`, 'error');
        authWrap.classList.remove('shake');
        void authWrap.offsetWidth; // reflow for re-trigger
        authWrap.classList.add('shake');
        authWrap.addEventListener('animationend', () => authWrap.classList.remove('shake'), { once: true });

        srHint.textContent = `Authentication failed. ${remaining} attempts remaining.`;
        setTimeout(() => inputPass.focus(), 80);
      }
    }

    // ── Click on title to activate ───────────────────────────────────
    document.getElementById('fd-title').addEventListener('click', activate);

    // ── Keyboard listeners ────────────────────────────────────────────

    // Username field: Enter commits, Escape resets
    inputUser.addEventListener('keydown', e => {
      if (e.key === 'Enter')  { e.preventDefault(); commitUsername(); }
      if (e.key === 'Escape') { e.preventDefault(); setStatus(''); resetToUsername(); }
    });

    // Password field: Enter submits, Escape goes back to username
    inputPass.addEventListener('keydown', e => {
      if (e.key === 'Enter')  { e.preventDefault(); attemptLogin(); }
      if (e.key === 'Escape') {
        e.preventDefault();
        inputPass.value = '';
        rowPass.style.display = 'none';
        rowPass.classList.remove('show');
        valUser.style.display = 'none';
        inputUser.style.display = '';
        setStatus('');
        setTimeout(() => inputUser.focus(), 50);
      }
    });

    // Clear error on any typing
    inputUser.addEventListener('input', () => setStatus(''));
    inputPass.addEventListener('input', () => setStatus(''));
  </script>
</body>
</html>
