<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Dashboard — Expenses</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <script>if(localStorage.getItem('oled_mode')==='1')document.documentElement.classList.add('oled');</script>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content page-content" id="content">

      <div class="section-header">
        <div>
          <div class="section-title">Expenses</div>
          <div class="section-subtitle">Monthly outgoings</div>
        </div>
        <button class="btn btn-primary btn-sm" id="add-expense-btn">+ Add expense</button>
      </div>

      <div id="expenses-summary"></div>

      <div id="budget-utilization"></div>

      <div class="panel mt-20" data-section="expenses">
        <div class="panel-header"><span class="panel-title">All Expenses</span></div>
        <div class="table-wrap" id="expenses-table-wrap"></div>
      </div>

      <div class="panel mt-20">
        <div class="panel-header">
          <span class="panel-title">Scheduled Changes</span>
          <button class="btn btn-secondary btn-sm" id="add-sc-btn">+ Add change</button>
        </div>
        <div id="scheduled-changes-list"></div>
      </div>

    </div>
  </div>
</div>
<script type="module" src="js/pages/expenses.js"></script>
</body>
</html>
