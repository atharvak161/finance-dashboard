<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Dashboard — Expenses</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content page-content" id="content">

      <div class="section-header">
        <div>
          <div class="section-title">Expenses</div>
          <div class="section-subtitle">Monthly outgoings</div>
        </div>
        <button class="btn btn-primary btn-sm" id="add-expense-btn">+ Add expense</button>
      </div>

      <div class="panel">
        <div class="panel-header"><span class="panel-title">All Expenses</span></div>
        <div class="table-wrap" id="expenses-table-wrap"></div>
      </div>

      <div class="panel mt-20">
        <div class="panel-header"><span class="panel-title">Scheduled Changes</span></div>
        <div id="scheduled-changes-list"></div>
      </div>

      <div class="grid-3 mt-20">
        <div class="panel">
          <div class="panel-header"><span class="panel-title">Category Split</span></div>
          <div class="chart-wrap chart-h-200"><canvas id="chart-exp-doughnut"></canvas></div>
          <div class="chart-legend" id="legend-exp-doughnut"></div>
        </div>
        <div class="panel">
          <div class="panel-header"><span class="panel-title">Current vs Post-Changes</span></div>
          <div class="chart-wrap chart-h-200"><canvas id="chart-exp-bar"></canvas></div>
        </div>
        <div class="panel">
          <div class="panel-header"><span class="panel-title">12-Month Trajectory</span></div>
          <div class="chart-wrap chart-h-200"><canvas id="chart-exp-line"></canvas></div>
        </div>
      </div>

    </div>
  </div>
</div>
<script type="module" src="js/pages/expenses.js"></script>
</body>
</html>
