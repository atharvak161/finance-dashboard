<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Dashboard — Overview</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script>if(localStorage.getItem('oled_mode')==='1')document.documentElement.classList.add('oled');</script>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content page-content" id="content">

      <div class="section-header" data-section="profile">
        <div>
          <div class="section-title">Overview</div>
          <div class="section-subtitle">Your full financial picture, by section</div>
        </div>
      </div>

      <div class="dash-tabs" id="dash-tabs">
        <button class="dash-tab active" data-tab="overview">Overview</button>
        <button class="dash-tab" data-tab="income">Income</button>
        <button class="dash-tab" data-tab="expenses">Expenses</button>
        <button class="dash-tab" data-tab="debts">Debts</button>
        <button class="dash-tab" data-tab="assets">Assets</button>
        <button class="dash-tab" data-tab="networth">Net Worth</button>
        <button class="dash-tab" data-tab="goals">Goals</button>
        <button class="dash-tab" data-tab="ot">OT Tracker</button>
        <button class="dash-tab" data-tab="tax">Tax</button>
        <button class="dash-tab" data-tab="analytics">Analytics</button>
      </div>

      <div id="dash-content"></div>

    </div>
  </div>
</div>
<script type="module" src="js/pages/dashboard.js"></script>
</body>
</html>
