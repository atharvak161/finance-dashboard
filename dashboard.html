<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Dashboard — Overview</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content page-content" id="content">

      <div class="section-header">
        <div>
          <div class="section-title">Overview</div>
          <div class="section-subtitle">Your financial snapshot</div>
        </div>
      </div>

      <div class="grid-4" id="overview-cards"></div>

      <div class="grid-2 mt-20">
        <div class="panel">
          <div class="panel-header"><span class="panel-title">Expense Breakdown</span></div>
          <div class="chart-wrap chart-h-260"><canvas id="chart-expense-doughnut"></canvas></div>
          <div class="chart-legend" id="legend-expense-doughnut"></div>
        </div>
        <div class="panel">
          <div class="panel-header"><span class="panel-title">Monthly Summary</span></div>
          <div class="chart-wrap chart-h-260"><canvas id="chart-monthly-bar"></canvas></div>
        </div>
      </div>

      <div class="grid-3 mt-20">
        <div class="panel gauge-wrap" id="gauge-debt">
          <div class="panel-title" style="margin-bottom:8px">Debt Clearance</div>
          <div class="gauge-chart-container"><canvas id="chart-gauge-debt"></canvas></div>
          <div class="gauge-value" id="gauge-val-debt">0%</div>
          <div class="gauge-label" id="gauge-lbl-debt">progress toward £0</div>
          <div class="gauge-phase text-warning" id="gauge-phase-debt">Clearing debt</div>
        </div>
        <div class="panel gauge-wrap" id="gauge-emergency">
          <div class="panel-title" style="margin-bottom:8px">Emergency Fund</div>
          <div class="gauge-chart-container"><canvas id="chart-gauge-emergency"></canvas></div>
          <div class="gauge-value" id="gauge-val-emergency">0%</div>
          <div class="gauge-label" id="gauge-lbl-emergency">of £3,000</div>
        </div>
        <div class="panel gauge-wrap" id="gauge-india">
          <div class="panel-title" style="margin-bottom:8px">India Trip</div>
          <div class="gauge-chart-container"><canvas id="chart-gauge-india"></canvas></div>
          <div class="gauge-value" id="gauge-val-india">0%</div>
          <div class="gauge-label" id="gauge-lbl-india">of £3,000</div>
        </div>
      </div>

    </div>
  </div>
</div>
<script type="module" src="js/pages/dashboard.js"></script>
</body>
</html>
