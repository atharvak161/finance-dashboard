<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Dashboard — Bill Calendar</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
.cal-header-cell { text-align:center; font-size:11px; color:var(--text-muted); padding:4px 0; font-weight:600; }
.cal-cell { min-height:72px; background:var(--bg-panel); border:1px solid var(--border-weak); border-radius:4px; padding:4px; font-size:11px; }
.cal-cell-empty { background:transparent; border-color:transparent; }
.cal-cell-today { border-color:var(--color-info); box-shadow:0 0 0 1px var(--color-info); }
.cal-cell-has-bills { background:var(--bg-panel-hover); }
.cal-day-num { font-size:11px; color:var(--text-muted); margin-bottom:2px; }
.cal-today-num { color:var(--color-info); font-weight:700; }
.cal-bill-chip { background:rgba(0,191,255,0.08); border-radius:3px; padding:2px 4px; margin-bottom:2px; display:flex; justify-content:space-between; gap:4px; }
.cal-bill-name { color:var(--text-secondary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:70px; }
.cal-bill-amt { color:var(--color-warning); font-size:10px; }
.cal-day-total { text-align:right; font-size:10px; color:var(--color-warning); margin-top:2px; border-top:1px solid var(--border-weak); padding-top:2px; }
  </style>
  <script>if(localStorage.getItem('oled_mode')==='1')document.documentElement.classList.add('oled');</script>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content page-content" id="content">
      <div class="section-header">
        <div>
          <div class="section-title">Bill Calendar</div>
          <div class="section-subtitle">Monthly recurring payments — when they fall due</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn btn-secondary btn-sm" id="cal-prev">‹ Prev</button>
          <span id="cal-month-label" class="stat-value" style="min-width:120px;text-align:center"></span>
          <button class="btn btn-secondary btn-sm" id="cal-next">Next ›</button>
        </div>
      </div>
      <div id="cal-content"></div>
    </div>
  </div>
</div>
<script type="module" src="js/pages/calendar.js"></script>
</body>
</html>
