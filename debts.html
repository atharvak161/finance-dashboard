<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Dashboard — Debts</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <script>if(localStorage.getItem('oled_mode')==='1')document.documentElement.classList.add('oled');</script>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content page-content" id="content">

      <div class="section-header">
        <div>
          <div class="section-title">Debts</div>
          <div class="section-subtitle">SBI Education Loan — view &amp; edit loan details</div>
        </div>
      </div>

      <!-- Summary cards (read-only, computed) -->
      <div class="grid-4" id="debt-summary"></div>

      <!-- Edit section -->
      <div class="panel mt-20" data-section="debts">
        <div class="panel-header">
          <span class="panel-title">Loan Details</span>
          <button class="btn btn-secondary btn-sm" id="debt-edit-btn">✏️ Edit Loan Details</button>
        </div>
        <div id="debt-fields"></div>
      </div>

    </div>
  </div>
</div>
<script type="module" src="js/pages/debts.js"></script>
</body>
</html>
