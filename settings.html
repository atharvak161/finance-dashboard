<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Dashboard — Settings</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content page-content" id="content">

      <div class="section-header" data-section="profile">
        <div>
          <div class="section-title">Settings</div>
          <div class="section-subtitle">Edit a tab, then click Save to apply your changes</div>
        </div>
      </div>

      <div class="tabs" id="settings-tabs">
        <button class="tab-btn active" data-tab="profile">Profile</button>
        <button class="tab-btn" data-tab="income">Income</button>
        <button class="tab-btn" data-tab="expenses">Expenses</button>
        <button class="tab-btn" data-tab="debts">Debts</button>
        <button class="tab-btn" data-tab="investments">Investments</button>
        <button class="tab-btn" data-tab="goals">Goals</button>
        <button class="tab-btn" data-tab="projections">Projections</button>
        <button class="tab-btn" data-tab="tax">Tax</button>
        <button class="tab-btn" data-tab="display">Display</button>
        <button class="tab-btn" data-tab="data">Data</button>
        <button class="tab-btn" data-tab="charts">Charts</button>
      </div>

      <div id="settings-content"></div>

    </div>
  </div>
</div>
<script type="module" src="js/pages/settings-page.js"></script>
</body>
</html>
