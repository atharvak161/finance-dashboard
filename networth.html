<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Dashboard — Net Worth</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content page-content" id="content">

      <div class="section-header">
        <div>
          <div class="section-title">Net Worth</div>
          <div class="section-subtitle">Current position &amp; projection settings</div>
        </div>
      </div>

      <!-- Summary card -->
      <div id="nw-summary-card"></div>

      <!-- Projection settings edit panel -->
      <div class="panel mt-20" id="nw-edit-panel">
        <div class="panel-header">
          <span class="panel-title">Projection Settings</span>
          <button class="btn btn-secondary btn-sm" id="nw-edit-btn">&#9998; Edit Projection Settings</button>
        </div>
        <div id="nw-edit-body"></div>
      </div>

    </div>
  </div>
</div>
<script type="module" src="js/pages/networth.js"></script>
</body>
</html>
