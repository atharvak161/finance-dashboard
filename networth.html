<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Dashboard — Net Worth</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content page-content" id="content">

      <div class="section-header">
        <div>
          <div class="section-title">Net Worth</div>
          <div class="section-subtitle">Current position &amp; projection settings</div>
        </div>
      </div>

      <!-- Summary card (current net worth) -->
      <div id="nw-summary-card"></div>

      <!-- Projection settings (always visible edit fields) -->
      <div class="panel mt-20">
        <div class="panel-header">
          <span class="panel-title">Projection Settings</span>
        </div>
        <div id="nw-settings-fields"></div>
      </div>

      <!-- Salary scenarios table -->
      <div class="panel mt-20">
        <div class="panel-header">
          <span class="panel-title">Salary Scenarios</span>
        </div>
        <div id="nw-scenarios"></div>
      </div>

      <!-- Net Worth Timeline -->
      <div class="panel mt-20">
        <div class="panel-header">
          <span class="panel-title">Net Worth Timeline</span>
        </div>
        <div style="height:320px;position:relative">
          <canvas id="chart-nw-timeline"></canvas>
        </div>
      </div>

      <!-- Age Trajectory -->
      <div class="panel mt-20">
        <div class="panel-header">
          <span class="panel-title">Age-to-Wealth Trajectory</span>
        </div>
        <div id="age-traj-controls" style="margin-bottom:12px"></div>
        <div style="height:280px;position:relative">
          <canvas id="chart-age-trajectory"></canvas>
        </div>
      </div>

    </div>
  </div>
</div>
<script type="module" src="js/pages/networth.js"></script>
</body>
</html>
