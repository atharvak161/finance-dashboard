<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Dashboard — Analytics</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content page-content" id="content">

      <div class="section-header">
        <div>
          <div class="section-title">Analytics</div>
          <div class="section-subtitle">Financial health ratios &amp; cross-section insights</div>
        </div>
      </div>

      <div class="grid-4" id="analytics-kpis" style="gap:16px"></div>

      <div class="grid-2 mt-20">
        <div class="panel">
          <div class="panel-header"><span class="panel-title">Spending Ratios vs Benchmarks</span></div>
          <div class="chart-wrap chart-h-260"><canvas id="chart-ratios"></canvas></div>
        </div>
        <div class="panel">
          <div class="panel-header"><span class="panel-title">Career Income Impact</span></div>
          <div id="analytics-career"></div>
        </div>
      </div>

      <div class="panel mt-20">
        <div class="panel-header"><span class="panel-title">Key Financial Metrics</span></div>
        <div id="analytics-metrics"></div>
      </div>

      <!-- Sankey -->
      <div class="panel mt-20">
        <div class="panel-header"><span class="panel-title">Monthly Cash Flow</span></div>
        <div id="sankey-container" style="width:100%;height:480px;overflow:hidden"></div>
      </div>

      <!-- Savings Rate -->
      <div class="panel mt-20">
        <div class="panel-header"><span class="panel-title">Savings Rate Trend</span></div>
        <div class="chart-wrap chart-h-200"><canvas id="chart-savings-rate"></canvas></div>
      </div>

      <!-- Surplus Trajectory -->
      <div class="panel mt-20">
        <div class="panel-header"><span class="panel-title">Surplus Trajectory</span></div>
        <div class="chart-wrap chart-h-260"><canvas id="chart-surplus-trajectory"></canvas></div>
      </div>

      <!-- Budget vs Actual Radar -->
      <div class="panel mt-20">
        <div class="panel-header"><span class="panel-title">Budget vs Actual</span></div>
        <div class="chart-wrap chart-h-300"><canvas id="chart-budget-radar"></canvas></div>
      </div>

    </div>
  </div>
</div>
<script type="module" src="js/pages/analytics.js"></script>
</body>
</html>
