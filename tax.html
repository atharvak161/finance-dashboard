<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Dashboard — Tax Tracker</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content page-content" id="content">

      <div class="section-header">
        <div>
          <div class="section-title">Tax Tracker</div>
          <div class="section-subtitle">Code 1034L — underpayment collection</div>
        </div>
      </div>

      <div class="grid-2">
        <div class="panel" data-section="tax">
          <div class="panel-header"><span class="panel-title">Underpayment Details</span></div>
          <div id="tax-fields"></div>
        </div>
        <div class="panel">
          <div class="panel-header"><span class="panel-title">Progress</span></div>
          <div id="tax-progress"></div>
        </div>
      </div>

      <div class="panel mt-20">
        <div class="panel-header"><span class="panel-title">Monthly Payslip Verification</span></div>
        <div class="calendar-grid mt-12" id="tax-calendar"></div>
      </div>

      <div class="panel mt-20">
        <div class="panel-header"><span class="panel-title">Cumulative Collection</span></div>
        <div class="chart-wrap chart-h-200"><canvas id="chart-tax-line"></canvas></div>
      </div>

    </div>
  </div>
</div>
<script type="module" src="js/pages/tax.js"></script>
</body>
</html>
